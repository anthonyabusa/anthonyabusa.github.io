<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Raster source: classic 8-point compass rose (Ant 2026-07-18: the old
       ring source read as a stopwatch). Long cardinal star + dimmer
       intercardinal star + ring; the luminance gap between the two stars
       gives the rasterizer its texture tiers. -->

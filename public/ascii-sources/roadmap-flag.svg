<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Raster source for Product & Program Leadership (Ant 2026-07-18: recycling
       triangle rejected). A rising roadmap: milestone nodes along a climbing
       path with a flag planted at the summit. Stroke-drawn like the compass and
       gears so the rasterizer reads it as texture, not a solid fill; the filled
       nodes + pennant give the brighter luminance tier. -->
  <path d="M22 174 C 62 168, 66 132, 104 122 S 150 92, 168 60"
        fill="none" stroke="#000" stroke-width="8" stroke-linecap="round"/>
  <!-- milestone nodes (brightest tier) -->
  <circle cx="22" cy="174" r="9" fill="#000"/>
  <circle cx="86" cy="140" r="9" fill="#000"/>
  <circle cx="132" cy="104" r="9" fill="#000"/>
  <!-- summit node the flag is planted in -->
  <circle cx="168" cy="60" r="11" fill="#000"/>
  <!-- flag pole + pennant -->
  <path d="M168 60 L168 14" fill="none" stroke="#000" stroke-width="7" stroke-linecap="round"/>
  <path d="M168 16 L120 28 L168 42 Z" fill="#000"/>
</svg>
